[dependency_model_aliases.composer]
harness = "cursor"
description = "Strong and cheap coding model, but only for coding. Value 10, intelligence 6, taste 3."
model = "composer-2.5"
provider = "cursor"

[dependency_model_aliases.deepseek]
description = "Cheap, good text coder for constrained tasks. Stronger reasoning than flash. Value 9, intelligence 6, taste 3."
default_effort = "high"
model = "deepseek-v4-pro"

[dependency_model_aliases.deepseekflash]
description = "Cheapest option for mechanical tasks. Fast, low cost, good enough for bulk reading and simple edits. Value 10, intelligence 5, taste 2."
default_effort = "high"
model = "deepseek-v4-flash"

[dependency_model_aliases.fable]
harness = "claude"
description = "Most capable model for complex tasks. Value 1, intelligence 9, taste 9."
default_effort = "high"
match = ["claude*fable*"]
exclude = ["*:*"]

[dependency_model_aliases.glm]
harness = "opencode"
description = "Strong coder. Codes well but lacks writing taste. Value 7, intelligence 7, taste 3."
default_effort = "high"
model = "opencode-go/glm-5.2"
provider = "opencode-go"

[dependency_model_aliases.gpt]
description = "Strong coding model family. Prefer as leaf models that do not orchestrate."
default_effort = "high"
match = ["gpt-5*"]
exclude = [
    "*codex*",
    "*-pro",
    "*-mini",
    "*-nano",
    "*-chat",
    "*-turbo",
]

[dependency_model_aliases.gpt55]
harness = "codex"
description = "Temporary compatibility alias for Sol. Use sol in new model policies."
prompting = "Outcome-first executor. Include the north-star goal, success criteria, relevant high-level context, constraints, expected output shape, and concrete verification: how to prove the goal is met and what evidence to report."
default_effort = "low"
model = "gpt-5.6-sol"

[dependency_model_aliases.gptmini]
description = "Fast and cheap. Good for bulk exploration and simple tasks. Value 9, intelligence 5, taste 3."
default_effort = "high"
provider = "openai"
match = ["gpt-5*-mini"]
exclude = ["*-nano"]

[dependency_model_aliases.luna]
harness = "codex"
description = "Cheapest capable coder. Good for bulk and background work, but longer trajectories and weaker judgment make it a poor lead. Value 10, intelligence 8, taste 3."
prompting = "Outcome-first executor. Include the north-star goal, success criteria, relevant high-level context, constraints, expected output shape, and concrete verification: how to prove the goal is met and what evidence to report."
model = "gpt-5.6-luna"

[dependency_model_aliases.opus]
harness = "claude"
description = "Opus family catch-all. Prefer pinned versions (opus46, opus48); each has distinct strengths."
default_effort = "high"
match = ["claude*opus*"]
exclude = ["*:*"]

[dependency_model_aliases.opus46]
harness = "claude"
description = "Best at inferring human intent. Strong conversational model; preferred for interactive primaries. Value 4, intelligence 8, taste 9."
default_effort = "high"
model = "claude-opus-4-6"

[dependency_model_aliases.opus48]
harness = "claude"
description = "Best at long-horizon orchestration and managing large numbers of subagents. Value 3, intelligence 8, taste 8."
default_effort = "high"
model = "claude-opus-4-8"

[dependency_model_aliases.sol]
harness = "codex"
description = "Strongest raw coder. Follows instructions, catches edge cases, and handles difficult technical work, but can miss unstated intent. Value 7, intelligence 9, taste 5."
prompting = "Outcome-first executor. Include the north-star goal, success criteria, relevant high-level context, constraints, expected output shape, and concrete verification: how to prove the goal is met and what evidence to report."
model = "gpt-5.6-sol"

[dependency_model_aliases.sonnet]
harness = "claude"
description = "Sonnet family catch-all. Prefer the pinned sonnet5 alias."
default_effort = "high"
match = ["claude*sonnet*"]
exclude = ["*:*"]

[dependency_model_aliases.sonnet5]
harness = "claude"
description = "Best combination of speed and intelligence in the Sonnet tier; near-Opus quality on coding and agentic work at Sonnet cost. Value 6, intelligence 8, taste 6."
default_effort = "high"
model = "claude-sonnet-5"

[dependency_model_aliases.terra]
harness = "codex"
description = "Best daily-driver coding value. Strong on bounded, verifiable work, but less reliable when ambiguity or taste matters. Value 9, intelligence 8, taste 4."
prompting = "Outcome-first executor. Include the north-star goal, success criteria, relevant high-level context, constraints, expected output shape, and concrete verification: how to prove the goal is met and what evidence to report."
model = "gpt-5.6-terra"
