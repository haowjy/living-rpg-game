# Project-local Codex config snippet for the Godot AI MCP bridge.
#
# Codex currently manages MCP servers in the user config by default. Keep this
# file tracked and use `scripts/codex-godot` when you want Codex with this
# repo's Godot MCP enabled without polluting other workspaces.

[mcp_servers."godot-ai"]
url = "http://127.0.0.1:8000/mcp"
enabled = true

